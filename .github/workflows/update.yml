name: Auto Scrape Nodes

on:
  schedule:
    - cron: "0 * * * *"  # 每小时的 0 分触发一次（UTC 时间）
  workflow_dispatch:     # 允许你在 GitHub 网页上点击按钮手动运行

permissions:
  contents: write        # 赋予 GitHub Actions 推送代码的权限

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    # 提前开启强行使用 Node.js 24 的全局环境变量，可以防止未来系统升级导致脚本中断
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper Script
        run: |
          python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "actions-user"
          git add output/*
          git commit -m "自动更新节点: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
